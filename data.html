<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datasæt – Reaktionstest</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: #1a202c;
    }

    /* Header */
    .page-header {
      max-width: 960px;
      margin: 0 auto 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
    }

    .page-header-left { flex: 1; }
    .page-header-left h1 { font-size: 1.8rem; margin-bottom: 4px; }
    .page-header-left .subtitle { color: #718096; font-size: 0.95rem; margin-bottom: 8px; }

    .nav-link { font-size: 0.88rem; color: #4a90d9; text-decoration: none; }
    .nav-link:hover { text-decoration: underline; }

    .btn-teacher-login {
      background: #edf2f7;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
      margin-top: 4px;
    }
    .btn-teacher-login:hover { background: #e2e8f0; }

    .teacher-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ebf8ff;
      border: 1.5px solid #90cdf4;
      border-radius: 10px;
      padding: 7px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2b6cb0;
      margin-top: 4px;
    }

    .btn-logout {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      margin-left: 6px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal-box h2 { font-size: 1.2rem; margin-bottom: 6px; }
    .modal-box p  { font-size: 0.88rem; color: #718096; margin-bottom: 20px; }

    .modal-box input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      margin-bottom: 10px;
    }
    .modal-box input[type="password"]:focus { border-color: #4a90d9; }

    .modal-error {
      font-size: 0.82rem;
      color: #e53e3e;
      font-weight: 600;
      min-height: 1.2rem;
      margin-bottom: 10px;
    }

    .modal-buttons { display: flex; gap: 10px; }

    .btn-primary {
      flex: 1;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:hover { background: #357abd; }

    .btn-cancel {
      background: #edf2f7;
      color: #4a5568;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #e2e8f0; }

    /* Sections */
    .section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a0aec0;
      margin-bottom: 16px;
    }

    /* Stat-kort */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (min-width: 540px) { .stat-grid { grid-template-columns: repeat(6, 1fr); } }

    .stat-card { background: #f7fafc; border-radius: 10px; padding: 14px 8px; text-align: center; }
    .stat-card .stat-value { font-size: 1.3rem; font-weight: 800; color: #4a90d9; line-height: 1.2; }
    .stat-card .stat-label { font-size: 0.7rem; color: #718096; margin-top: 4px; }

    /* Gruppetabel */
    .group-table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    .group-table th {
      text-align: left; padding: 8px 12px; background: #f7fafc;
      color: #4a5568; font-weight: 700; border-bottom: 2px solid #e2e8f0;
    }
    .group-table td { padding: 9px 12px; border-bottom: 1px solid #edf2f7; color: #2d3748; }
    .group-table tr:last-child td { border-bottom: none; }
    .group-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* Data-tabel */
    .table-toolbar {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    }

    .btn-download {
      background: #38a169; color: white; border: none; border-radius: 10px 0 0 10px;
      padding: 10px 16px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-download:hover { background: #2f855a; }

    .btn-download-caret {
      background: #2f855a; color: white; border: none; border-radius: 0 10px 10px 0;
      padding: 10px 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      border-left: 1px solid #276749; transition: background 0.15s;
    }
    .btn-download-caret:hover { background: #276749; }

    .download-group { position: relative; display: flex; }

    .download-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
      min-width: 240px;
      z-index: 50;
      overflow: hidden;
    }
    .download-menu.open { display: block; }

    .download-menu-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #a0aec0;
      padding: 10px 16px 6px;
    }

    .download-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      padding: 10px 16px;
      font-size: 0.88rem;
      color: #2d3748;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }
    .download-menu-item:hover { background: #f7fafc; }
    .download-menu-item .menu-icon { font-size: 1rem; width: 20px; text-align: center; }
    .download-menu-divider { height: 1px; background: #edf2f7; margin: 4px 0; }

    .table-wrap { overflow-x: auto; }

    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; white-space: nowrap; }

    table.data-table th {
      padding: 10px 12px; background: #f7fafc; text-align: left;
      font-weight: 700; color: #4a5568; border-bottom: 2px solid #e2e8f0;
      cursor: pointer; user-select: none;
    }
    table.data-table th.no-sort { cursor: default; }
    table.data-table th:hover:not(.no-sort) { background: #edf2f7; }
    table.data-table th.sorted { color: #4a90d9; }

    table.data-table td { padding: 9px 12px; border-bottom: 1px solid #edf2f7; color: #2d3748; }
    table.data-table tr:last-child td { border-bottom: none; }
    table.data-table tr:hover td { background: #f7fafc; }
    table.data-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .sort-icon { margin-left: 4px; font-size: 0.72rem; opacity: 0.45; }
    th.sorted .sort-icon { opacity: 1; }

    /* Slet-knap */
    .btn-delete {
      background: none;
      border: 1.5px solid #fed7d7;
      border-radius: 6px;
      color: #e53e3e;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-delete:hover { background: #fff5f5; border-color: #e53e3e; }

    /* Top-3 */
    .top3-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .top3-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
    }

    .podium-item {
      flex: 1;
      max-width: 180px;
      text-align: center;
    }

    .podium-card {
      border-radius: 12px;
      padding: 16px 10px 12px;
      position: relative;
    }

    .podium-item.gold   .podium-card { background: #fffbeb; border: 2px solid #f6e05e; }
    .podium-item.silver .podium-card { background: #f7fafc; border: 2px solid #cbd5e0; }
    .podium-item.bronze .podium-card { background: #fff5f0; border: 2px solid #fbd38d; }

    .podium-medal { font-size: 2rem; margin-bottom: 6px; }
    .podium-name  { font-size: 0.9rem; font-weight: 700; color: #2d3748; margin-bottom: 4px; word-break: break-word; }
    .podium-time  { font-size: 1.4rem; font-weight: 800; color: #4a90d9; }
    .podium-unit  { font-size: 0.72rem; color: #718096; }
    .podium-rank  { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; }

    .podium-item.gold   { order: 2; }
    .podium-item.silver { order: 1; }
    .podium-item.bronze { order: 3; }

    .btn-top3 {
      background: #f6e05e;
      color: #744210;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-top3:hover { background: #ecc94b; }

    /* Filtreret download */
    .filter-download-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .filter-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: #2d3748;
      min-width: 80px;
    }

    .filter-age-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-age-group label {
      font-size: 0.85rem;
      color: #718096;
    }

    .filter-age-input {
      width: 64px;
      padding: 7px 10px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      outline: none;
    }
    .filter-age-input:focus { border-color: #4a90d9; }

    .btn-filter-download {
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-filter-download:hover { background: #357abd; }

    .filter-info {
      font-size: 0.8rem;
      color: #a0aec0;
      margin-left: auto;
    }

    /* Loading / states */
    .state-msg { text-align: center; padding: 48px 16px; color: #718096; font-size: 0.95rem; line-height: 1.8; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #e2e8f0; border-top-color: #4a90d9;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* Edit-modal */
    .edit-modal-box {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .edit-modal-box h2 { font-size: 1.2rem; margin-bottom: 20px; }

    .edit-field-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #4a5568;
      display: block;
      margin-bottom: 6px;
    }

    .edit-input {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
      background: #f7fafc;
      color: #1a202c;
    }
    .edit-input:focus { border-color: #4a90d9; background: white; }

    .edit-gender-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .edit-gender-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .edit-gender-option input[type="radio"] { accent-color: #4a90d9; }

    .edit-rounds-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .edit-round-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f7fafc;
      border-radius: 8px;
      padding: 6px 10px;
      margin-bottom: 6px;
    }
    .edit-round-label { font-size: 0.82rem; color: #718096; min-width: 64px; }
    .edit-round-input {
      width: 80px;
      padding: 5px 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: right;
      outline: none;
      background: white;
    }
    .edit-round-input:focus { border-color: #4a90d9; }
    .edit-round-unit { font-size: 0.82rem; color: #a0aec0; }
    .btn-remove-round {
      margin-left: auto;
      background: none;
      border: 1.5px solid #fed7d7;
      border-radius: 6px;
      color: #e53e3e;
      font-size: 0.9rem;
      font-weight: 700;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .btn-remove-round:hover { background: #fff5f5; }

    .btn-edit {
      background: none;
      border: 1.5px solid #bee3f8;
      border-radius: 6px;
      color: #2b6cb0;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-edit:hover { background: #ebf8ff; border-color: #90cdf4; }
  </style>
</head>
<body>

  <!-- Edit-modal -->
  <div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
    <div class="edit-modal-box" onclick="event.stopPropagation()">
      <h2>Rediger måling</h2>

      <label class="edit-field-label">Navn</label>
      <input type="text" id="edit-name" class="edit-input" placeholder="Fornavn Efternavn" />

      <div style="display:flex;gap:12px;">
        <div style="flex:1;">
          <label class="edit-field-label">Alder</label>
          <input type="number" id="edit-age" class="edit-input" min="1" max="120" placeholder="f.eks. 42" />
        </div>
        <div style="flex:1;">
          <label class="edit-field-label">Køn</label>
          <div class="edit-gender-row">
            <label class="edit-gender-option">
              <input type="radio" name="edit-gender" value="Mand"> Mand
            </label>
            <label class="edit-gender-option">
              <input type="radio" name="edit-gender" value="Kvinde"> Kvinde
            </label>
          </div>
        </div>
      </div>

      <div class="edit-rounds-header">
        <label class="edit-field-label" style="margin-bottom:0;">Runder <span id="edit-round-count" style="font-weight:400;color:#a0aec0;"></span></label>
      </div>
      <div id="edit-rounds-list" style="margin-bottom:16px;"></div>

      <div class="modal-error" id="edit-error"></div>
      <div class="modal-buttons">
        <button class="btn-primary" id="edit-save-btn" onclick="saveEdit()">Gem ændringer</button>
        <button class="btn-cancel" onclick="closeEditModal()">Annuller</button>
      </div>
    </div>
  </div>

  <!-- Login-modal -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-box">
      <h2>Lærer-login</h2>
      <p>Indtast adgangskoden for at se navne og slette data.</p>
      <input type="password" id="password-input" placeholder="Adgangskode"
             onkeydown="if(event.key==='Enter') checkPassword()" />
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-buttons">
        <button class="btn-primary" onclick="checkPassword()">Log ind</button>
        <button class="btn-cancel" onclick="closeModal()">Annuller</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="page-header">
    <div class="page-header-left">
      <h1>Datasæt</h1>
      <p class="subtitle">Reaktionstest · Deskriptiv statistik</p>
      <a class="nav-link" href="index.html">← Tilbage til testen</a>
    </div>
    <div id="login-area">
      <button class="btn-teacher-login" onclick="openModal()">🔒 Lærer</button>
    </div>
  </div>

  <!-- Indlæsning -->
  <div class="section" id="loading-section">
    <div class="state-msg">
      <div class="spinner"></div><br>
      Henter data fra databasen…
    </div>
  </div>

  <!-- Fejl / tom -->
  <div class="section hidden" id="error-section">
    <div class="state-msg" id="error-msg-text"></div>
  </div>

  <!-- Statistik -->
  <div class="section hidden" id="stats-section">
    <div class="section-title" id="stats-title">Samlet statistik</div>
    <div class="stat-grid" id="stat-cards"></div>

  </div>

  <!-- Top 3 -->
  <div class="top3-section hidden" id="top3-section">
    <div class="top3-header">
      <div class="section-title" style="margin-bottom:0;">Top 3 – Bedste reaktionstid</div>
      <button class="btn-cancel" style="font-size:0.8rem;padding:6px 12px;" onclick="toggleTop3()">Skjul</button>
    </div>
    <div class="podium" id="podium-container"></div>
  </div>

  <!-- Filtreret download -->
  <div class="filter-download-section hidden" id="filter-download-section">
    <div class="section-title" style="margin-bottom:16px;">Download filtreret datasæt</div>
    <div class="filter-rows">

      <div class="filter-row">
        <div class="filter-label">Kvinder</div>
        <div class="filter-age-group">
          <label>Alder fra</label>
          <input class="filter-age-input" type="number" id="kvinder-min" min="0" max="99" placeholder="–">
          <label>til</label>
          <input class="filter-age-input" type="number" id="kvinder-max" min="0" max="99" placeholder="–">
        </div>
        <button class="btn-filter-download" onclick="downloadFiltered('Kvinde', 'kvinder-min', 'kvinder-max')">⬇ Download</button>
        <span class="filter-info" id="kvinder-count"></span>
      </div>

      <div class="filter-row">
        <div class="filter-label">Mænd</div>
        <div class="filter-age-group">
          <label>Alder fra</label>
          <input class="filter-age-input" type="number" id="maend-min" min="0" max="99" placeholder="–">
          <label>til</label>
          <input class="filter-age-input" type="number" id="maend-max" min="0" max="99" placeholder="–">
        </div>
        <button class="btn-filter-download" onclick="downloadFiltered('Mand', 'maend-min', 'maend-max')">⬇ Download</button>
        <span class="filter-info" id="maend-count"></span>
      </div>

      <div class="filter-row">
        <div class="filter-label">Alle</div>
        <div class="filter-age-group">
          <label>Alder fra</label>
          <input class="filter-age-input" type="number" id="alle-min" min="0" max="99" placeholder="–">
          <label>til</label>
          <input class="filter-age-input" type="number" id="alle-max" min="0" max="99" placeholder="–">
        </div>
        <button class="btn-filter-download" onclick="downloadFiltered(null, 'alle-min', 'alle-max')">⬇ Download</button>
        <span class="filter-info" id="alle-count"></span>
      </div>

    </div>
  </div>

  <!-- Databel -->
  <div class="section hidden" id="table-section">
    <div class="table-toolbar">
      <div class="section-title" style="margin-bottom:0;">Alle målinger</div>
      <div style="display:flex;gap:10px;">
        <button class="btn-top3" onclick="toggleTop3()">🏆 Top 3</button>
        <button class="btn-top3" style="background:#ebf8ff;color:#2b6cb0;" onclick="toggleFilterDownload()">🔽 Filtreret download</button>
        <div class="download-group" id="download-group">
          <button class="btn-download" onclick="downloadExcel('sort')">⬇ Download Excel</button>
          <button class="btn-download-caret" onclick="toggleDownloadMenu(event)" title="Vælg sortering">▾</button>
          <div class="download-menu" id="download-menu">
            <div class="download-menu-title">Vælg sortering</div>
            <button class="download-menu-item" onclick="downloadExcel('sort')">
              <span class="menu-icon">↕</span> Aktuel tabelsortering
            </button>
            <button class="download-menu-item" onclick="downloadExcel('tidspunkt')">
              <span class="menu-icon">🕐</span> Kronologisk rækkefølge
            </button>
            <div class="download-menu-divider"></div>
            <button class="download-menu-item" onclick="downloadExcel('gennemsnit')">
              <span class="menu-icon">⚡</span> Gennemsnit (hurtigst først)
            </button>
            <button class="download-menu-item" onclick="downloadExcel('alder')">
              <span class="menu-icon">🎂</span> Alder (yngst først)
            </button>
            <button class="download-menu-item" onclick="downloadExcel('kon')">
              <span class="menu-icon">👥</span> Køn (alfabetisk)
            </button>
            <button class="download-menu-item" onclick="downloadExcel('elev')">
              <span class="menu-icon">📋</span> Elevnavn (alfabetisk)
            </button>
            <div class="download-menu-divider"></div>
            <button class="download-menu-item" onclick="downloadExcel('alle')">
              <span class="menu-icon">📊</span> <strong>Alle sorteringer (ét ark)</strong>
            </button>
          </div>
        </div>
        <button id="btn-clear-all" class="btn-delete" style="display:none;padding:10px 14px;font-size:0.9rem;font-weight:700;border-radius:10px;border:2px solid #e53e3e;color:#e53e3e;" onclick="clearAllData()">🗑 Ryd alt data</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ============================================================
    //  SKIFT DETTE TIL DIN EGEN ADGANGSKODE
    const TEACHER_PASSWORD = 'lærer2025';
    // ============================================================

    const firebaseConfig = {
      apiKey:            "AIzaSyBpPh11XsjZa5ErEJgkQIK43lTwjacx9tY",
      authDomain:        "reaktionstest-3dd96.firebaseapp.com",
      projectId:         "reaktionstest-3dd96",
      storageBucket:     "reaktionstest-3dd96.firebasestorage.app",
      messagingSenderId: "176269433635",
      appId:             "1:176269433635:web:5db872724aeebd9fcc0a96"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Kolonner ─────────────────────────────────────────────
    const COLUMNS_STATIC_START = [
      { key: 'id',         label: 'ID',          numeric: false },
      { key: 'elev',       label: 'Elev',        numeric: false },
      { key: 'alder',      label: 'Alder',       numeric: true  },
      { key: 'kon',        label: 'Køn',         numeric: false },
    ];
    const COLUMNS_STATIC_END = [
      { key: 'gennemsnit', label: 'Gns. (ms)',   numeric: true  },
      { key: 'bedste',     label: 'Bedste (ms)', numeric: true  },
    ];

    // Ekstra kolonner i lærer-tilstand (navn + slet)
    const COL_NAVN  = { key: 'testperson', label: 'Navn',  numeric: false };
    const COL_SLET    = { key: '_slet',    label: 'Slet',    numeric: false, noSort: true };
    const COL_REDIGER = { key: '_rediger', label: 'Rediger', numeric: false, noSort: true };

    let allData    = [];
    let sortCol    = null;
    let sortDir    = 'asc';
    let teacherMode = false;

    function getColumns() {
      const base = [...COLUMNS_STATIC_START, ...COLUMNS_STATIC_END];
      if (!teacherMode) return base;
      return [base[0], COL_NAVN, ...base.slice(1), COL_REDIGER, COL_SLET];
    }

    // ── Hent data ─────────────────────────────────────────────
    async function loadData() {
      try {
        const snap = await getDocs(collection(db, 'reaktioner'));
        document.getElementById('loading-section').classList.add('hidden');

        if (snap.empty) {
          showMsg('Ingen data i databasen endnu.', '#718096');
          return;
        }

        const sorted = snap.docs
          .map(doc => ({ _docId: doc.id, ...doc.data() }))
          .sort((a, b) => (a.tidspunkt?.seconds ?? 0) - (b.tidspunkt?.seconds ?? 0));

        const elevCount = {};
        allData = sorted.map(d => {
          elevCount[d.elev] = (elevCount[d.elev] || 0) + 1;
          d.id = `${d.elev} tp. ${elevCount[d.elev]}`;
          return d;
        });

        renderStats();
        renderTable();
        document.getElementById('stats-section').classList.remove('hidden');
        document.getElementById('filter-download-section').classList.remove('hidden');
        document.getElementById('table-section').classList.remove('hidden');

      } catch (err) {
        console.error(err);
        document.getElementById('loading-section').classList.add('hidden');
        showMsg('Kunne ikke hente data. Tjek din internetforbindelse.', '#e53e3e');
      }
    }

    loadData().then(() => {
      if (new URLSearchParams(location.search).has('top3')) toggleTop3();
    });

    function showMsg(text, color) {
      const sec = document.getElementById('error-section');
      document.getElementById('error-msg-text').textContent = text;
      document.getElementById('error-msg-text').style.color = color;
      sec.classList.remove('hidden');
    }

    // ── Statistik ─────────────────────────────────────────────
    function calcStats(values) {
      const n = values.length;
      if (!n) return null;
      const mean   = values.reduce((a, b) => a + b, 0) / n;
      const sorted = [...values].sort((a, b) => a - b);
      const median = n % 2 !== 0
        ? sorted[Math.floor(n / 2)]
        : (sorted[n / 2 - 1] + sorted[n / 2]) / 2;
      const std = Math.sqrt(values.reduce((s, x) => s + (x - mean) ** 2, 0) / n);
      return { n, mean, median, std, min: sorted[0], max: sorted[n - 1] };
    }

    function renderStats() {
      const s = calcStats(allData.map(d => d.gennemsnit));
      if (!s) return;

      document.getElementById('stats-title').textContent = `Samlet statistik (n = ${s.n})`;

      const cards = [
        { label: 'Antal',      val: s.n,      fmt: v => v },
        { label: 'Gennemsnit', val: s.mean,   fmt: v => Math.round(v) + ' ms' },
        { label: 'Median',     val: s.median, fmt: v => Math.round(v) + ' ms' },
        { label: 'Spredning',  val: s.std,    fmt: v => v.toFixed(1).replace('.', ',') + ' ms' },
      ];

      document.getElementById('stat-cards').innerHTML = cards.map(c =>
        `<div class="stat-card">
           <div class="stat-value">${c.fmt(c.val)}</div>
           <div class="stat-label">${c.label}</div>
         </div>`
      ).join('');

    }

    // ── Sorterbar tabel ───────────────────────────────────────
    function getSorted() {
      if (!sortCol) return [...allData];
      return [...allData].sort((a, b) => {
        const av = a[sortCol], bv = b[sortCol];
        if (typeof av === 'number') return sortDir === 'asc' ? av - bv : bv - av;
        return sortDir === 'asc'
          ? String(av ?? '').localeCompare(String(bv ?? ''), 'da')
          : String(bv ?? '').localeCompare(String(av ?? ''), 'da');
      });
    }

    function renderTable() {
      const cols = getColumns();

      document.getElementById('table-head').innerHTML =
        '<tr>' + cols.map(col => {
          if (col.noSort) return `<th class="no-sort">${col.label}</th>`;
          const active = sortCol === col.key;
          const icon   = !active ? '↕' : sortDir === 'asc' ? '↑' : '↓';
          return `<th class="${active ? 'sorted' : ''}" onclick="sortBy('${col.key}')">
            ${col.label}<span class="sort-icon">${icon}</span>
          </th>`;
        }).join('') + '</tr>';

      document.getElementById('table-body').innerHTML =
        getSorted().map(d =>
          '<tr>' + cols.map(col => {
            if (col.key === '_rediger') {
              return `<td><button class="btn-edit" onclick="openEditModal('${d._docId}')">✏ Rediger</button></td>`;
            }
            if (col.key === '_slet') {
              return `<td><button class="btn-delete" onclick="deleteEntry('${d._docId}', '${d.id}')">Slet</button></td>`;
            }
            return `<td class="${col.numeric ? 'num' : ''}">${d[col.key] ?? '–'}</td>`;
          }).join('') + '</tr>'
        ).join('');
    }

    window.sortBy = function (col) {
      if (sortCol === col) {
        if (sortDir === 'asc')       sortDir = 'desc';
        else if (sortDir === 'desc') { sortCol = null; sortDir = 'asc'; }
      } else { sortCol = col; sortDir = 'asc'; }
      renderTable();
    };

    // ── Slet post ─────────────────────────────────────────────
    window.deleteEntry = async function (docId, label) {
      if (!confirm(`Slet "${label}" fra databasen? Dette kan ikke fortrydes.`)) return;
      try {
        await deleteDoc(doc(db, 'reaktioner', docId));
        allData = allData.filter(d => d._docId !== docId);
        renderStats();
        renderTable();
      } catch (err) {
        console.error(err);
        alert('Kunne ikke slette. Prøv igen.');
      }
    };

    // ── Ryd alt data ──────────────────────────────────────────
    window.clearAllData = async function () {
      if (!confirm(`Slet ALLE ${allData.length} målinger fra databasen? Dette kan ikke fortrydes.`)) return;
      try {
        await Promise.all(allData.map(d => deleteDoc(doc(db, 'reaktioner', d._docId))));
        allData = [];
        renderStats();
        renderTable();
      } catch (err) {
        console.error(err);
        alert('Kunne ikke rydde data. Prøv igen.');
      }
    };

    // ── Rediger entry ─────────────────────────────────────────
    let editingDoc = null;

    window.openEditModal = function (docId) {
      const d = allData.find(x => x._docId === docId);
      if (!d) return;

      const rounds = [];
      let i = 1;
      while (d['runde' + i] !== undefined) { rounds.push(d['runde' + i]); i++; }

      editingDoc = { _docId: docId, rounds: [...rounds] };

      document.getElementById('edit-name').value = d.testperson ?? '';
      document.getElementById('edit-age').value  = d.alder ?? '';
      document.querySelectorAll('input[name="edit-gender"]').forEach(r => {
        r.checked = r.value === d.kon;
      });

      document.getElementById('edit-error').textContent = '';
      document.getElementById('edit-save-btn').disabled = false;
      document.getElementById('edit-save-btn').textContent = 'Gem ændringer';

      renderEditRounds();
      document.getElementById('edit-modal').classList.add('open');
    };

    window.closeEditModal = function () {
      document.getElementById('edit-modal').classList.remove('open');
      editingDoc = null;
    };

    function renderEditRounds() {
      const container = document.getElementById('edit-rounds-list');
      container.innerHTML = editingDoc.rounds.map((rt, i) =>
        `<div class="edit-round-row">
          <span class="edit-round-label">Runde ${i + 1}</span>
          <input type="number" class="edit-round-input" value="${rt}" min="1" max="9999" />
          <span class="edit-round-unit">ms</span>
          <button class="btn-remove-round" onclick="removeRoundFromEdit(${i})" title="Slet runde">&times;</button>
        </div>`
      ).join('');
      const n = editingDoc.rounds.length;
      document.getElementById('edit-round-count').textContent =
        `(${n} ${n === 1 ? 'runde' : 'runder'})`;
    }

    window.removeRoundFromEdit = function (idx) {
      // Sync current input values before splicing
      const inputs = document.querySelectorAll('.edit-round-input');
      editingDoc.rounds = Array.from(inputs).map(inp => parseInt(inp.value) || 0);
      editingDoc.rounds.splice(idx, 1);
      renderEditRounds();
    };

    window.saveEdit = async function () {
      const name   = document.getElementById('edit-name').value.trim();
      const age    = parseInt(document.getElementById('edit-age').value);
      const gender = document.querySelector('input[name="edit-gender"]:checked')?.value;

      // Read round values from DOM
      const roundInputs = document.querySelectorAll('.edit-round-input');
      const rounds = Array.from(roundInputs).map(inp => parseInt(inp.value)).filter(v => !isNaN(v) && v > 0);

      const errEl = document.getElementById('edit-error');
      if (!name)             { errEl.textContent = 'Navn må ikke være tomt.';          return; }
      if (!age || age < 1)   { errEl.textContent = 'Ugyldig alder.';                   return; }
      if (!gender)           { errEl.textContent = 'Vælg et køn.';                     return; }
      if (rounds.length < 1) { errEl.textContent = 'Der skal være mindst 1 runde.';    return; }
      errEl.textContent = '';

      const avg  = Math.round(rounds.reduce((a, b) => a + b, 0) / rounds.length);
      const best = Math.min(...rounds);

      const existing = allData.find(d => d._docId === editingDoc._docId);
      const fullData = {
        elev:                  existing.elev,
        testperson:            name,
        testperson_normalized: name.toLowerCase().replace(/\s+/g, ' '),
        alder:                 age,
        kon:                   gender,
        gennemsnit:            avg,
        bedste:                best,
        tidspunkt:             existing.tidspunkt,
      };
      rounds.forEach((rt, i) => { fullData['runde' + (i + 1)] = rt; });

      const btn = document.getElementById('edit-save-btn');
      btn.disabled = true;
      btn.textContent = 'Gemmer…';

      try {
        await setDoc(doc(db, 'reaktioner', editingDoc._docId), fullData);

        // Update allData in place
        const idx = allData.findIndex(d => d._docId === editingDoc._docId);
        if (idx !== -1) {
          // Remove old runde fields
          Object.keys(allData[idx]).filter(k => /^runde\d+$/.test(k)).forEach(k => delete allData[idx][k]);
          Object.assign(allData[idx], fullData);
        }

        closeEditModal();
        renderStats();
        renderTable();
      } catch (err) {
        console.error(err);
        errEl.textContent = 'Kunne ikke gemme. Prøv igen.';
        btn.disabled = false;
        btn.textContent = 'Gem ændringer';
      }
    };

    // ── Top 3 ─────────────────────────────────────────────────
    window.toggleTop3 = function () {
      const sec = document.getElementById('top3-section');
      if (sec.classList.contains('hidden')) {
        renderTop3();
        sec.classList.remove('hidden');
      } else {
        sec.classList.add('hidden');
      }
    };

    function renderTop3() {
      const medals = ['gold', 'silver', 'bronze'];
      const icons  = ['🥇', '🥈', '🥉'];
      const top = [...allData]
        .sort((a, b) => a.gennemsnit - b.gennemsnit)
        .slice(0, 3);

      document.getElementById('podium-container').innerHTML = top.map((d, i) =>
        `<div class="podium-item ${medals[i]}">
           <div class="podium-card">
             <div class="podium-medal">${icons[i]}</div>
             <div class="podium-name">${d.testperson ?? d.id}</div>
             <div class="podium-time">${d.gennemsnit}</div>
             <div class="podium-unit">ms (gns.)</div>
             <div class="podium-rank">Elev: ${d.elev}</div>
           </div>
         </div>`
      ).join('');
    }

    // ── Excel-download ────────────────────────────────────────
    const SORT_OPTIONS = [
      { key: 'tidspunkt',   label: 'Kronologisk',          col: null,         dir: 'asc'  },
      { key: 'gennemsnit',  label: 'Gennemsnit (hurtigst)', col: 'gennemsnit', dir: 'asc'  },
      { key: 'alder',       label: 'Alder (yngst)',         col: 'alder',      dir: 'asc'  },
      { key: 'kon',         label: 'Køn',                   col: 'kon',        dir: 'asc'  },
      { key: 'elev',        label: 'Elevnavn',              col: 'elev',       dir: 'asc'  },
    ];

    function getMaxRunder() {
      return allData.reduce((max, d) => {
        let i = 1;
        while (d['runde' + i] !== undefined) i++;
        return Math.max(max, i - 1);
      }, 0);
    }

    function sortData(sortKey) {
      if (sortKey === 'sort') return getSorted();
      if (sortKey === 'tidspunkt') {
        return [...allData].sort((a, b) => (a.tidspunkt?.seconds ?? 0) - (b.tidspunkt?.seconds ?? 0));
      }
      const opt = SORT_OPTIONS.find(o => o.key === sortKey);
      if (!opt || !opt.col) return [...allData];
      return [...allData].sort((a, b) => {
        const av = a[opt.col], bv = b[opt.col];
        if (typeof av === 'number') return opt.dir === 'asc' ? av - bv : bv - av;
        return String(av ?? '').localeCompare(String(bv ?? ''), 'da');
      });
    }

    function buildRows(data, maxRunder) {
      return data.map(d => {
        const row = {
          'ID':    d.id,
          'Elev':  d.elev,
          'Alder': d.alder,
          'Køn':   d.kon,
        };
        if (teacherMode) row['Navn'] = d.testperson ?? '';
        for (let i = 1; i <= maxRunder; i++) {
          row[`Runde ${i} (ms)`] = d['runde' + i] ?? '';
        }
        row['Gennemsnit (ms)'] = d.gennemsnit;
        row['Bedste (ms)']     = d.bedste;
        return row;
      });
    }

    function makeSheet(rows, maxRunder) {
      const ws = XLSX.utils.json_to_sheet(rows);
      const nameCol = teacherMode ? 1 : 0;
      const colWidths = [22, 16, 8, 10];
      if (teacherMode) colWidths.splice(1, 0, 20);
      for (let i = 0; i < maxRunder; i++) colWidths.push(12);
      colWidths.push(16, 12);
      ws['!cols'] = colWidths.map(w => ({ wch: w }));
      return ws;
    }

    window.downloadExcel = function (sortKey = 'sort') {
      closeDownloadMenu();
      const maxRunder = getMaxRunder();

      if (sortKey === 'alle') {
        const wb = XLSX.utils.book_new();
        for (const opt of SORT_OPTIONS) {
          const rows = buildRows(sortData(opt.key), maxRunder);
          XLSX.utils.book_append_sheet(wb, makeSheet(rows, maxRunder), opt.label);
        }
        XLSX.writeFile(wb, 'reaktionstest-alle-sorteringer.xlsx');
        return;
      }

      const rows = buildRows(sortData(sortKey), maxRunder);
      const ws = makeSheet(rows, maxRunder);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Reaktionstest');

      const suffix = sortKey === 'sort' ? '' : '-' + sortKey;
      XLSX.writeFile(wb, `reaktionstest-data${suffix}.xlsx`);
    };

    window.toggleDownloadMenu = function (e) {
      e.stopPropagation();
      document.getElementById('download-menu').classList.toggle('open');
    };

    function closeDownloadMenu() {
      document.getElementById('download-menu').classList.remove('open');
    }

    document.addEventListener('click', function (e) {
      if (!document.getElementById('download-group').contains(e.target)) {
        closeDownloadMenu();
      }
    });

    // ── Filtreret download ────────────────────────────────────
    window.toggleFilterDownload = function () {
      const sec = document.getElementById('filter-download-section');
      sec.classList.toggle('hidden');
      if (!sec.classList.contains('hidden')) updateFilterCounts();
    };

    function updateFilterCounts() {
      for (const { kon, minId, maxId, countId } of [
        { kon: 'Kvinde', minId: 'kvinder-min', maxId: 'kvinder-max', countId: 'kvinder-count' },
        { kon: 'Mand',   minId: 'maend-min',   maxId: 'maend-max',   countId: 'maend-count'  },
        { kon: null,     minId: 'alle-min',     maxId: 'alle-max',     countId: 'alle-count'   },
      ]) {
        const filtered = getFiltered(kon, minId, maxId);
        document.getElementById(countId).textContent =
          filtered.length > 0 ? `${filtered.length} person(er)` : 'Ingen match';
      }
    }

    function getFiltered(kon, minId, maxId) {
      const minVal = document.getElementById(minId).value;
      const maxVal = document.getElementById(maxId).value;
      const minAge = minVal !== '' ? parseInt(minVal) : -Infinity;
      const maxAge = maxVal !== '' ? parseInt(maxVal) :  Infinity;
      return allData.filter(d =>
        (kon === null || d.kon === kon) &&
        d.alder >= minAge &&
        d.alder <= maxAge
      );
    }

    window.downloadFiltered = function (kon, minId, maxId) {
      const data = getFiltered(kon, minId, maxId);

      if (data.length === 0) {
        alert('Ingen målinger matcher det valgte filter.');
        return;
      }

      const minVal = document.getElementById(minId).value;
      const maxVal = document.getElementById(maxId).value;

      const rows = data
        .sort((a, b) => a.gennemsnit - b.gennemsnit)
        .map(d => ({
          'ID':               d.id,
          'Elev':             d.elev,
          'Alder':            d.alder,
          'Køn':              d.kon,
          'Gennemsnit (ms)':  d.gennemsnit,
        }));

      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{ wch: 22 }, { wch: 16 }, { wch: 8 }, { wch: 10 }, { wch: 16 }];
      const wb = XLSX.utils.book_new();
      const sheetName = kon === 'Kvinde' ? 'Kvinder' : kon === 'Mand' ? 'Mænd' : 'Alle';
      XLSX.utils.book_append_sheet(wb, ws, sheetName);

      const aldersStr = (minVal || '?') + '-' + (maxVal || '?');
      const kønsStr   = kon === 'Kvinde' ? 'kvinder' : kon === 'Mand' ? 'maend' : 'alle';
      XLSX.writeFile(wb, `reaktionstest-${kønsStr}-alder${aldersStr}.xlsx`);
    };

    // Opdater antal ved ændring af aldersfelter
    document.addEventListener('input', function (e) {
      if (['kvinder-min','kvinder-max','maend-min','maend-max','alle-min','alle-max'].includes(e.target.id)) {
        updateFilterCounts();
      }
    });

    // ── Login / modal ─────────────────────────────────────────
    window.openModal = function () {
      document.getElementById('password-input').value = '';
      document.getElementById('modal-error').textContent = '';
      document.getElementById('login-modal').classList.add('open');
      setTimeout(() => document.getElementById('password-input').focus(), 50);
    };

    window.closeModal = function () {
      document.getElementById('login-modal').classList.remove('open');
    };

    window.checkPassword = function () {
      const val = document.getElementById('password-input').value;
      if (val === TEACHER_PASSWORD) {
        teacherMode = true;
        closeModal();
        document.getElementById('login-area').innerHTML =
          `<div class="teacher-badge">
             🔓 Logget ind som lærer
             <button class="btn-logout" onclick="logout()">Log ud</button>
           </div>`;
        document.getElementById('btn-clear-all').style.display = '';
        renderTable();
      } else {
        document.getElementById('modal-error').textContent = 'Forkert adgangskode.';
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
      }
    };

    window.logout = function () {
      teacherMode = false;
      document.getElementById('login-area').innerHTML =
        `<button class="btn-teacher-login" onclick="openModal()">🔒 Lærer</button>`;
      document.getElementById('btn-clear-all').style.display = 'none';
      renderTable();
    };

    // Luk modal ved klik på overlay
    document.getElementById('login-modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
